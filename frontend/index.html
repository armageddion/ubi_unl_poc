<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBI UNL POC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="password-modal" class="modal">
        <div class="modal-content">
            <h2>Authentication Required</h2>
            <p>Please enter the password to access this application.</p>
            <input type="password" id="password-input" placeholder="Enter password" />
            <button id="password-submit">Submit</button>
            <p id="password-error" class="error hidden">Incorrect password. Please try again.</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <h1>UBI UNL POC</h1>
        </header>

        <main>
            <div class="trigger-section">
                <h2>Page Change</h2>
                <div class="input-row">
                    <label for="labelcodes-1">Label Codes (comma-separated)</label>
                    <input type="text" id="labelcodes-1" placeholder="e.g., 04507B0AC391,04507B0AC392" />
                </div>
                <div class="input-row">
                    <label for="page-1">Page Number</label>
                    <input type="number" id="page-1" placeholder="e.g., 1" min="1" />
                </div>
                <button id="btn-1">Execute Page Change</button>
            </div>

            <div class="trigger-section">
                <h2>LED Blink</h2>
                <div class="input-row">
                    <label for="labelcodes-2">Label Codes (comma-separated)</label>
                    <input type="text" id="labelcodes-2" placeholder="e.g., 04507B0AC391,04507B0AC392" />
                </div>
                <div class="input-row-group">
                    <div class="input-row half">
                        <label for="color-2">Color</label>
                        <select id="color-2">
                            <option value="RED">RED</option>
                            <option value="GREEN">GREEN</option>
                            <option value="YELLOW">YELLOW</option>
                            <option value="BLUE">BLUE</option>
                            <option value="MAGENTA">MAGENTA</option>
                            <option value="CYAN">CYAN</option>
                            <option value="WHITE">WHITE</option>
                        </select>
                    </div>
                    <div class="input-row half">
                        <label for="duration-2">Duration</label>
                        <select id="duration-2">
                            <option value="0s">0s</option>
                            <option value="10s">10s</option>
                            <option value="30s">30s</option>
                            <option value="1m">1m</option>
                            <option value="2m">2m</option>
                            <option value="5m">5m</option>
                            <option value="10m">10m</option>
                            <option value="15m">15m</option>
                            <option value="20m">20m</option>
                            <option value="30m">30m</option>
                            <option value="60m">60m</option>
                        </select>
                    </div>
                </div>
                <button id="btn-2">Execute LED Blink</button>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
